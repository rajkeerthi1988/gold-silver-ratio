<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gold Silver Ratio Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<meta name="description" content="Gold Silver Ratio Dashboard with signals, sentiment and strategy insights.">

</head>

<body>

<h1>Gold Silver Ratio Dashboard</h1>

<div class="container">

<div class="card">
<h2>Enter Current Ratio</h2>

<input id="manualRatio" placeholder="Example: 82">
<button onclick="updateFromManual()">Update Dashboard</button>

<h3>Current Ratio</h3>
<p id="ratio">--</p>
</div>


<div class="card">
<h2>Signal</h2>
<p id="signal">--</p>
</div>


<div class="card">
<h2>Strategy</h2>
<p id="strategy">--</p>
</div>


<div class="card">
<h2>Market Sentiment</h2>
<p id="sentiment">--</p>
</div>


<div class="card">
<h2>Ratio Gauge</h2>
<canvas id="gauge" width="300" height="150"></canvas>
</div>


<div class="card chart">
<h2>Gold/Silver Ratio Chart</h2>

<!-- TradingView Widget -->
<div id="tradingview_ratio"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
container_id: "tradingview_ratio",
width: "100%",
height: 500,
symbol: "TVC:GOLD/TVC:SILVER",
interval: "D",
timezone: "Etc/UTC",
theme: "light",
style: "1",
locale: "en",
enable_publishing: false,
allow_symbol_change: false
});
</script>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
