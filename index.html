<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold Silver Ratio Tracker</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Gold Silver Ratio Tracker</h1>

<div class="dashboard">

<div class="card">
<h3>Gold Price</h3>
<p id="gold">Loading...</p>
</div>

<div class="card">
<h3>Silver Price</h3>
<p id="silver">Loading...</p>
</div>

<div class="card highlight">
<h3>Gold-Silver Ratio</h3>
<p id="ratio">Loading...</p>
</div>

</div>

<canvas id="ratioChart"></canvas>

<script src="script.js"></script>

</body>
</html>
