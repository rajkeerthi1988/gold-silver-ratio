<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gold Silver Ratio Tracker</title>

<meta name="description" content="Live Gold Silver Ratio calculator. Track gold and silver prices and compare their ratio in real time.">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Gold Silver Ratio Tracker</h1>

<div class="dashboard">

<div class="card">
<h3>Gold Price</h3>
<p id="gold">Loading...</p>
</div>

<div class="card">
<h3>Silver Price</h3>
<p id="silver">Loading...</p>
</div>

<div class="card highlight">
<h3>Gold Silver Ratio</h3>
<p id="ratio">Loading...</p>
</div>

</div>

<p id="signal"></p>

<canvas id="ratioChart"></canvas>

<script src="script.js"></script>

</body>
</html>
